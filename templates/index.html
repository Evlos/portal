<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bookmarks</title>
<script>
  (function () {
    var savedTheme = localStorage.getItem('bmTheme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var isDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
    console.log('[theme] preload check -> savedTheme:', savedTheme, 'prefersDark:', prefersDark, 'applyDark:', isDark);
    if (isDark) document.documentElement.classList.add('dark');
  })();
</script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class' };
</script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen font-sans transition-colors duration-200">

<div class="max-w-3xl mx-auto px-4 py-10 transition-[max-width] duration-200" id="mainContainer">

  <header class="flex items-start justify-between mb-8">
    <div>
      <h1 class="text-2xl font-bold tracking-tight">📚 Bookmarks</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">你的链接收藏夹</p>
    </div>
    <div class="flex items-center gap-2">
      <button id="btnAddMode" onclick="toggleAddMode()"
        class="px-3 py-1.5 text-sm rounded-md border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">+ 添加</button>
      <button id="btnEditMode" onclick="toggleEditMode()"
        class="px-3 py-1.5 text-sm rounded-md border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">编辑</button>
      <button id="btnTheme" onclick="toggleTheme()"
        class="px-3 py-1.5 text-sm rounded-md border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">🌙</button>
    </div>
  </header>

  <form id="addForm" action="/add" method="post"
    class="hidden bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg p-5 mb-6 shadow-sm">
    <p class="text-xs font-semibold text-slate-500 dark:text-slate-400 mb-3 uppercase tracking-wide">新建条目</p>
    <div class="mb-3">
      <label class="block text-xs text-slate-500 dark:text-slate-400 mb-1">标题</label>
      <input type="text" name="title" placeholder="可选标签..." autocomplete="off"
        class="w-full border-b border-slate-300 dark:border-slate-600 bg-transparent py-1 focus:outline-none focus:border-blue-500 dark:focus:border-blue-400">
    </div>
    <div class="mb-4">
      <label class="block text-xs text-slate-500 dark:text-slate-400 mb-1">URL</label>
      <input type="url" name="url" placeholder="https://..." required autocomplete="off"
        class="w-full border-b border-slate-300 dark:border-slate-600 bg-transparent py-1 focus:outline-none focus:border-blue-500 dark:focus:border-blue-400">
    </div>
    <div class="flex gap-2">
      <button type="submit" class="px-4 py-1.5 text-sm rounded-md bg-blue-600 text-white hover:bg-blue-700 transition">保存</button>
      <button type="button" onclick="toggleAddMode()"
        class="px-4 py-1.5 text-sm rounded-md border border-slate-300 dark:border-slate-600 hover:bg-slate-100 dark:hover:bg-slate-800 transition">取消</button>
    </div>
  </form>

  <div class="flex flex-wrap items-center gap-4 mb-4">
    <span id="listHeader" class="text-xs text-slate-500 dark:text-slate-400 uppercase tracking-wide">共 {{ items|length }} 条</span>
    <div class="flex gap-1" id="colBtns">
      <button id="btnCol1" onclick="setColumns(1)" class="colBtn px-2 py-1 text-xs rounded border border-blue-500 text-blue-500">1</button>
      <button id="btnCol2" onclick="setColumns(2)" class="colBtn px-2 py-1 text-xs rounded border border-slate-300 dark:border-slate-600">2</button>
      <button id="btnCol3" onclick="setColumns(3)" class="colBtn px-2 py-1 text-xs rounded border border-slate-300 dark:border-slate-600">3</button>
      <button id="btnCol4" onclick="setColumns(4)" class="colBtn px-2 py-1 text-xs rounded border border-slate-300 dark:border-slate-600">4</button>
    </div>
    <div class="flex gap-1 pl-4 border-l border-slate-300 dark:border-slate-600" id="widthBtns">
      <button id="btnW760" onclick="setWidth('max-w-3xl')" class="widthBtn px-2 py-1 text-xs rounded border border-blue-500 text-blue-500">760</button>
      <button id="btnW960" onclick="setWidth('max-w-4xl')" class="widthBtn px-2 py-1 text-xs rounded border border-slate-300 dark:border-slate-600">960</button>
      <button id="btnW1024" onclick="setWidth('max-w-5xl')" class="widthBtn px-2 py-1 text-xs rounded border border-slate-300 dark:border-slate-600">1024</button>
      <button id="btnW98pct" onclick="setWidth('max-w-[98%]')" class="widthBtn px-2 py-1 text-xs rounded border border-slate-300 dark:border-slate-600">98%</button>
    </div>
  </div>

  {% if items %}
  <ul id="bookmarkList" class="grid grid-cols-1 gap-2">
    {% for item in items %}
    <li class="bookmarkItem flex items-center gap-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-3 hover:border-blue-400 dark:hover:border-blue-500 transition"
        data-id="{{ item.id }}" id="item-{{ item.id }}">
      <span class="dragHandle hidden text-slate-400 cursor-grab select-none">⠿</span>
      <div class="flex-1 min-w-0">
        <div class="itemTitle font-medium truncate">{{ item.title }}</div>
        <div class="itemUrl text-xs text-slate-500 dark:text-slate-400 truncate mt-0.5">
          <a href="{{ item.url }}" target="_blank" rel="noopener" class="hover:underline">{{ item.url }}</a>
        </div>
      </div>
      <div class="itemActions hidden gap-2">
        <button onclick="openEdit({{ item.id }}, event)"
          class="px-2 py-1 text-xs rounded border border-amber-400 text-amber-500 hover:bg-amber-400 hover:text-white transition">编辑</button>
        <button onclick="confirmDelete({{ item.id }}, event)"
          class="px-2 py-1 text-xs rounded border border-red-400 text-red-500 hover:bg-red-400 hover:text-white transition">删除</button>
      </div>
    </li>
    <div class="editPanel hidden flex-col gap-2 bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-700 rounded-lg p-4 -mt-1 mb-1"
         id="edit-{{ item.id }}">
      <div class="flex items-center gap-2">
        <label class="text-xs text-slate-500 dark:text-slate-400 w-12">标题</label>
        <input id="et-{{ item.id }}" type="text" value="{{ item.title }}"
          class="flex-1 border-b border-slate-300 dark:border-slate-600 bg-transparent py-1 focus:outline-none focus:border-blue-500">
      </div>
      <div class="flex items-center gap-2">
        <label class="text-xs text-slate-500 dark:text-slate-400 w-12">URL</label>
        <input id="eu-{{ item.id }}" type="url" value="{{ item.url }}"
          class="flex-1 border-b border-slate-300 dark:border-slate-600 bg-transparent py-1 focus:outline-none focus:border-blue-500">
      </div>
      <div class="flex gap-2 mt-1">
        <button onclick="saveEdit({{ item.id }})" class="px-3 py-1 text-xs rounded bg-green-600 text-white hover:bg-green-700">保存</button>
        <button onclick="closeEdit({{ item.id }})" class="px-3 py-1 text-xs rounded border border-slate-300 dark:border-slate-600">取消</button>
      </div>
    </div>
    {% endfor %}
  </ul>
  {% else %}
  <div class="text-center text-slate-400 dark:text-slate-500 text-sm border border-dashed border-slate-300 dark:border-slate-600 rounded-lg py-10">暂无收藏</div>
  {% endif %}

</div>

<div id="confirmOverlay" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
  <div class="bg-white dark:bg-slate-800 border border-red-400 rounded-lg p-6 text-center min-w-[280px]">
    <p class="text-red-500 text-sm mb-4">确认删除该条目？<br>此操作无法撤销。</p>
    <div class="flex gap-3 justify-center">
      <button id="confirmYes" class="px-4 py-1.5 text-sm rounded bg-red-500 text-white hover:bg-red-600">删除</button>
      <button onclick="cancelDelete()" class="px-4 py-1.5 text-sm rounded border border-slate-300 dark:border-slate-600">取消</button>
    </div>
  </div>
</div>

<div id="toast"
  class="fixed bottom-6 right-6 bg-white dark:bg-slate-800 border border-green-500 text-green-600 dark:text-green-400 text-xs px-4 py-2 rounded shadow opacity-0 translate-y-2 transition pointer-events-none">
</div>

<script>
let editMode = false;
let addMode = false;

function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('bmTheme', isDark ? 'dark' : 'light');
  document.getElementById('btnTheme').textContent = isDark ? '☀️' : '🌙';
  console.log('[theme] toggled -> isDark:', isDark, 'persisted to localStorage.bmTheme');
}

function toggleEditMode() {
  editMode = !editMode;
  console.log('[editMode] toggled ->', editMode);
  if (editMode && addMode) {
    addMode = false;
    document.getElementById('addForm').classList.add('hidden');
    document.getElementById('btnAddMode').classList.remove('bg-blue-600', 'text-white');
    console.log('[editMode] auto-closed addMode because edit was enabled');
  }
  document.querySelectorAll('.itemActions').forEach(el => el.classList.toggle('hidden', !editMode));
  document.querySelectorAll('.itemActions').forEach(el => el.classList.toggle('flex', editMode));
  document.querySelectorAll('.dragHandle').forEach(el => el.classList.toggle('hidden', !editMode));
  const btn = document.getElementById('btnEditMode');
  btn.classList.toggle('bg-amber-500', editMode);
  btn.classList.toggle('text-white', editMode);
  btn.textContent = editMode ? '退出编辑' : '编辑';
  if (sortableInst) sortableInst.option('disabled', !editMode);
  if (!editMode) {
    document.querySelectorAll('.editPanel').forEach(p => {
      p.classList.add('hidden');
      p.classList.remove('flex');
    });
  }
}

function toggleAddMode() {
  addMode = !addMode;
  console.log('[addMode] toggled ->', addMode);
  const form = document.getElementById('addForm');
  const btn = document.getElementById('btnAddMode');
  form.classList.toggle('hidden', !addMode);
  btn.classList.toggle('bg-blue-600', addMode);
  btn.classList.toggle('text-white', addMode);
  btn.textContent = addMode ? '取消添加' : '+ 添加';
  if (addMode) form.querySelector('input[name="url"]').focus();
}

let currentCols = 1;
function setColumns(n) {
  currentCols = n;
  console.log('[columns] set to', n);
  const listEl = document.getElementById('bookmarkList');
  if (!listEl) return;
  listEl.className = 'grid gap-2 grid-cols-' + n;
  document.querySelectorAll('.colBtn').forEach((b, i) => {
    const active = (i + 1) === n;
    b.classList.toggle('border-blue-500', active);
    b.classList.toggle('text-blue-500', active);
    b.classList.toggle('border-slate-300', !active);
    b.classList.toggle('dark:border-slate-600', !active);
  });
  localStorage.setItem('bmCols', n);
}

const WIDTH_MAP = { 'max-w-3xl': 'btnW760', 'max-w-4xl': 'btnW960', 'max-w-5xl': 'btnW1024', 'max-w-[98%]': 'btnW98pct' };
function setWidth(w) {
  console.log('[width] set to', w);
  const containerEl = document.getElementById('mainContainer');
  Object.keys(WIDTH_MAP).forEach(cls => containerEl.classList.remove(cls));
  containerEl.classList.add(w);
  Object.entries(WIDTH_MAP).forEach(([cls, id]) => {
    const active = cls === w;
    const b = document.getElementById(id);
    if (!b) return;
    b.classList.toggle('border-blue-500', active);
    b.classList.toggle('text-blue-500', active);
    b.classList.toggle('border-slate-300', !active);
    b.classList.toggle('dark:border-slate-600', !active);
  });
  localStorage.setItem('bmWidth', w);
}

(function restorePreferences() {
  const savedCols = parseInt(localStorage.getItem('bmCols') || '1', 10);
  if (savedCols >= 1 && savedCols <= 4) setColumns(savedCols);
  const savedWidth = localStorage.getItem('bmWidth');
  setWidth(savedWidth && WIDTH_MAP.hasOwnProperty(savedWidth) ? savedWidth : 'max-w-3xl');
  console.log('[init] preferences restored -> cols:', savedCols, 'width:', savedWidth);
})();

const list = document.getElementById('bookmarkList');
let sortableInst = null;
if (list) {
  sortableInst = new Sortable(list, {
    animation: 150,
    handle: '.dragHandle',
    ghostClass: 'opacity-30',
    dragClass: 'shadow-lg',
    disabled: true,
    onEnd: function () {
      const ids = [...list.querySelectorAll('.bookmarkItem')].map(el => +el.dataset.id);
      console.log('[reorder] new order ->', ids);
      fetch('/reorder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(ids)
      }).then(r => console.log('[reorder] server responded', r.status));
      toast('顺序已保存');
    }
  });
}

function openEdit(id, e) {
  e.stopPropagation();
  console.log('[edit] open panel for id', id);
  document.querySelectorAll('.editPanel').forEach(p => { p.classList.add('hidden'); p.classList.remove('flex'); });
  const panel = document.getElementById('edit-' + id);
  panel.classList.remove('hidden');
  panel.classList.add('flex');
}
function closeEdit(id) {
  console.log('[edit] close panel for id', id);
  const panel = document.getElementById('edit-' + id);
  panel.classList.add('hidden');
  panel.classList.remove('flex');
}
async function saveEdit(id) {
  const title = document.getElementById('et-' + id).value.trim();
  const url = document.getElementById('eu-' + id).value.trim();
  console.log('[edit] saving id', id, { title, url });
  if (!url) { toast('URL 不能为空', true); console.warn('[edit] rejected: empty URL'); return; }
  try {
    const res = await fetch('/edit/' + id, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, url })
    });
    const data = await res.json();
    console.log('[edit] server response', data);
    if (data.status === 'ok') {
      const li = document.getElementById('item-' + id);
      li.querySelector('.itemTitle').textContent = data.title;
      const link = li.querySelector('.itemUrl a');
      link.textContent = data.url;
      link.href = data.url;
      closeEdit(id);
      toast('条目已更新');
    } else {
      toast(data.message || '更新失败', true);
    }
  } catch (err) {
    console.error('[edit] request failed', err);
    toast('网络错误', true);
  }
}

let pendingDeleteId = null;
function confirmDelete(id, e) {
  e.stopPropagation();
  pendingDeleteId = id;
  console.log('[delete] confirm requested for id', id);
  const overlay = document.getElementById('confirmOverlay');
  overlay.classList.remove('hidden');
  overlay.classList.add('flex');
  document.getElementById('confirmYes').onclick = () => executeDelete(id);
}
function cancelDelete() {
  console.log('[delete] cancelled for id', pendingDeleteId);
  pendingDeleteId = null;
  const overlay = document.getElementById('confirmOverlay');
  overlay.classList.add('hidden');
  overlay.classList.remove('flex');
}
async function executeDelete(id) {
  const overlay = document.getElementById('confirmOverlay');
  overlay.classList.add('hidden');
  overlay.classList.remove('flex');
  console.log('[delete] executing for id', id);
  try {
    const res = await fetch('/delete/' + id, { method: 'POST' });
    const data = await res.json();
    console.log('[delete] server response', data);
    if (data.status === 'ok') {
      document.getElementById('item-' + id).remove();
      const ep = document.getElementById('edit-' + id);
      if (ep) ep.remove();
      const count = document.querySelectorAll('.bookmarkItem').length;
      document.getElementById('listHeader').textContent = '共 ' + count + ' 条';
      if (!count) {
        document.getElementById('bookmarkList').outerHTML =
          '<div class="text-center text-slate-400 dark:text-slate-500 text-sm border border-dashed border-slate-300 dark:border-slate-600 rounded-lg py-10">暂无收藏</div>';
      }
      toast('条目已删除');
    }
  } catch (err) {
    console.error('[delete] request failed', err);
    toast('网络错误', true);
  }
}

document.getElementById('confirmOverlay').addEventListener('click', function (e) {
  if (e.target === this) cancelDelete();
});

let toastTimer;
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('opacity-0', 'translate-y-2', 'border-green-500', 'border-red-500', 'text-green-600', 'text-red-500');
  el.classList.add(err ? 'border-red-500' : 'border-green-500', err ? 'text-red-500' : 'text-green-600');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.add('opacity-0', 'translate-y-2'), 2200);
  console.log('[toast]', err ? 'ERROR' : 'INFO', msg);
}

document.getElementById('btnTheme').textContent =
  document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
</script>
</body>
</html>
