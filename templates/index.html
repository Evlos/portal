<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>// BOOKMARKS</title>

<script>
  // Apply saved theme before first paint to avoid flash-of-wrong-theme
  (function () {
    var savedTheme = localStorage.getItem('bmTheme');
    if (savedTheme === 'dark') {
      document.documentElement.classList.add('dark');
    }
    console.log('[theme:init] localStorage bmTheme =', savedTheme);
  })();
</script>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = { darkMode: 'class' };
</script>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
</head>

<body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 font-mono min-h-screen transition-colors duration-200">
<div class="max-w-3xl mx-auto px-4 py-10" id="containerEl">

  <!-- ── Header ── -->
  <header class="flex items-start justify-between mb-8 flex-wrap gap-3">
    <div>
      <h1 class="text-2xl font-bold tracking-widest border-l-4 border-indigo-500 pl-3">// BOOKMARKS</h1>
      <p class="text-xs text-gray-400 dark:text-gray-500 tracking-widest mt-1">terminal link vault</p>
    </div>
    <div class="flex items-center gap-2">
      <button id="btnAddMode" onclick="toggleAddMode()"
        class="px-3 py-1.5 text-xs tracking-widest border rounded border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 hover:border-blue-400 hover:text-blue-500 transition">
        [ ADD ]
      </button>
      <button id="btnEditMode" onclick="toggleEditMode()"
        class="px-3 py-1.5 text-xs tracking-widest border rounded border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 hover:border-amber-400 hover:text-amber-500 transition">
        [ EDIT ]
      </button>
      <button id="btnTheme" onclick="toggleTheme()"
        class="px-3 py-1.5 text-xs tracking-widest border rounded border-gray-300 dark:border-gray-600 text-gray-500 dark:text-gray-400 hover:border-indigo-400 hover:text-indigo-500 transition">
        [ DARK ]
      </button>
    </div>
  </header>

  <!-- ── Add form ── -->
  <form id="addForm" action="/add" method="post"
    class="hidden bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg p-5 mb-8 shadow-sm">
    <div class="text-xs text-blue-500 tracking-wide mb-4">&gt; ADD NEW ENTRY</div>
    <div class="flex items-center gap-3 mb-3">
      <label class="w-16 text-xs text-gray-400 dark:text-gray-500">TITLE</label>
      <input type="text" name="title" placeholder="optional label..." autocomplete="off"
        class="flex-1 bg-transparent border-b border-gray-300 dark:border-gray-600 focus:border-indigo-500 outline-none py-1 text-sm">
    </div>
    <div class="flex items-center gap-3 mb-4">
      <label class="w-16 text-xs text-gray-400 dark:text-gray-500">URL</label>
      <input type="url" name="url" placeholder="https://..." required autocomplete="off"
        class="flex-1 bg-transparent border-b border-gray-300 dark:border-gray-600 focus:border-indigo-500 outline-none py-1 text-sm">
    </div>
    <div class="flex gap-3">
      <button type="submit"
        class="px-5 py-1.5 text-xs tracking-widest border border-indigo-500 text-indigo-500 rounded hover:bg-indigo-500 hover:text-white transition">[ SAVE ]</button>
      <button type="button" onclick="toggleAddMode()"
        class="px-5 py-1.5 text-xs tracking-widest border border-gray-300 dark:border-gray-600 text-gray-400 rounded hover:bg-gray-400 hover:text-white transition">[ CANCEL ]</button>
    </div>
  </form>

  <!-- ── List header row ── -->
  <div class="flex items-center flex-wrap gap-3 mb-4">
    <div class="text-xs text-gray-400 dark:text-gray-500 tracking-widest" id="listHeader">&gt; SAVED ENTRIES ({{ items|length }})</div>
    <div class="flex gap-1" id="colBtns">
      <button class="btnCol px-2 py-0.5 text-[10px] border rounded border-gray-300 dark:border-gray-600 text-gray-400" data-cols="1" onclick="setColumns(1)">1</button>
      <button class="btnCol px-2 py-0.5 text-[10px] border rounded border-gray-300 dark:border-gray-600 text-gray-400" data-cols="2" onclick="setColumns(2)">2</button>
      <button class="btnCol px-2 py-0.5 text-[10px] border rounded border-gray-300 dark:border-gray-600 text-gray-400" data-cols="3" onclick="setColumns(3)">3</button>
      <button class="btnCol px-2 py-0.5 text-[10px] border rounded border-gray-300 dark:border-gray-600 text-gray-400" data-cols="4" onclick="setColumns(4)">4</button>
    </div>
    <div class="flex gap-1 pl-3 border-l border-gray-300 dark:border-gray-600" id="widthBtns">
      <button class="btnWidth px-2 py-0.5 text-[10px] border rounded border-gray-300 dark:border-gray-600 text-gray-400" data-width="760px" onclick="setWidth('760px')">760</button>
      <button class="btnWidth px-2 py-0.5 text-[10px] border rounded border-gray-300 dark:border-gray-600 text-gray-400" data-width="960px" onclick="setWidth('960px')">960</button>
      <button class="btnWidth px-2 py-0.5 text-[10px] border rounded border-gray-300 dark:border-gray-600 text-gray-400" data-width="1024px" onclick="setWidth('1024px')">1024</button>
      <button class="btnWidth px-2 py-0.5 text-[10px] border rounded border-gray-300 dark:border-gray-600 text-gray-400" data-width="98%" onclick="setWidth('98%')">98%</button>
    </div>
  </div>

  <!-- ── Bookmark list ── -->
  {% if items %}
  <ul id="bookmarkList" class="flex flex-col gap-2">
    {% for item in items %}
    <li class="bookmarkItem flex items-center gap-3 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-3 min-h-[52px] transition hover:border-indigo-400"
        data-id="{{ item.id }}" id="item-{{ item.id }}">
      <span class="dragHandle hidden text-gray-400 select-none cursor-grab">&#10783;</span>
      <div class="flex-1 min-w-0">
        <div class="itemTitle text-sm truncate">{{ item.title }}</div>
        <div class="itemUrl text-xs text-gray-400 dark:text-gray-500 truncate mt-0.5">
          <a href="{{ item.url }}" target="_blank" rel="noopener" class="hover:underline">{{ item.url }}</a>
        </div>
      </div>
      <div class="itemActions hidden gap-2 flex-shrink-0">
        <button class="px-2.5 py-1 text-[11px] border border-amber-400 text-amber-500 rounded hover:bg-amber-400 hover:text-white transition"
          onclick="openEdit({{ item.id }}, event)">EDIT</button>
        <button class="px-2.5 py-1 text-[11px] border border-rose-400 text-rose-500 rounded hover:bg-rose-400 hover:text-white transition"
          onclick="confirmDelete({{ item.id }}, event)">DEL</button>
      </div>
    </li>
    <div class="editPanel hidden flex-col gap-3 bg-gray-50 dark:bg-gray-800/60 border border-gray-200 dark:border-gray-700 rounded-lg px-4 py-3 -mt-1" id="edit-{{ item.id }}">
      <div class="flex items-center gap-3">
        <label class="w-14 text-xs text-gray-400">TITLE</label>
        <input class="flex-1 bg-transparent border-b border-gray-300 dark:border-gray-600 focus:border-indigo-500 outline-none py-1 text-sm" id="et-{{ item.id }}" type="text" value="{{ item.title }}" autocomplete="off">
      </div>
      <div class="flex items-center gap-3">
        <label class="w-14 text-xs text-gray-400">URL</label>
        <input class="flex-1 bg-transparent border-b border-gray-300 dark:border-gray-600 focus:border-indigo-500 outline-none py-1 text-sm" id="eu-{{ item.id }}" type="url" value="{{ item.url }}" autocomplete="off">
      </div>
      <div class="flex gap-2">
        <button class="px-4 py-1 text-[11px] border border-indigo-500 text-indigo-500 rounded hover:bg-indigo-500 hover:text-white transition" onclick="saveEdit({{ item.id }})">[ SAVE ]</button>
        <button class="px-4 py-1 text-[11px] border border-gray-300 dark:border-gray-600 text-gray-400 rounded hover:bg-gray-400 hover:text-white transition" onclick="closeEdit({{ item.id }})">[ CANCEL ]</button>
      </div>
    </div>
    {% endfor %}
  </ul>
  {% else %}
  <div class="text-center text-xs text-gray-400 dark:text-gray-500 tracking-widest border border-dashed border-gray-300 dark:border-gray-600 rounded-lg py-8">_ NO ENTRIES YET _</div>
  {% endif %}

</div>

<!-- ── Confirm delete overlay ── -->
<div id="confirmOverlay" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-50">
  <div class="bg-white dark:bg-gray-800 border border-rose-400 rounded-lg px-8 py-7 text-center min-w-[280px]">
    <p class="text-rose-500 text-sm mb-5 leading-relaxed">&gt; CONFIRM DELETE?<br>THIS ACTION CANNOT BE UNDONE.</p>
    <div class="flex gap-3 justify-center">
      <button id="confirmYes" class="px-5 py-1.5 text-xs tracking-widest border border-rose-500 text-rose-500 rounded hover:bg-rose-500 hover:text-white transition">[ DELETE ]</button>
      <button onclick="cancelDelete()" class="px-5 py-1.5 text-xs tracking-widest border border-gray-300 dark:border-gray-600 text-gray-400 rounded hover:bg-gray-400 hover:text-white transition">[ CANCEL ]</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast" class="fixed bottom-6 right-6 bg-white dark:bg-gray-800 border border-indigo-500 text-indigo-500 text-xs px-4 py-2.5 rounded-lg opacity-0 translate-y-2 transition-all duration-300 pointer-events-none z-50"></div>

<script>
/* ══════════════════════════════════════════════
   Mode state
   ══════════════════════════════════════════════ */
let editMode = false;
let addMode = false;

function toggleTheme() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('bmTheme', isDark ? 'dark' : 'light');
  document.getElementById('btnTheme').textContent = isDark ? '[ LIGHT ]' : '[ DARK ]';
  console.log('[theme:toggle] now dark =', isDark);
}

function toggleEditMode() {
  editMode = !editMode;
  console.log('[mode:edit] editMode =', editMode);

  if (editMode && addMode) {
    addMode = false;
    document.getElementById('addForm').classList.add('hidden');
    setAddButtonActive(false);
  }

  document.querySelectorAll('.dragHandle').forEach(el => el.classList.toggle('hidden', !editMode));
  document.querySelectorAll('.itemActions').forEach(el => el.classList.toggle('hidden', !editMode));
  document.querySelectorAll('.bookmarkItem').forEach(el => el.classList.toggle('cursor-grab', editMode));

  const btn = document.getElementById('btnEditMode');
  btn.textContent = editMode ? '[ EXIT EDIT ]' : '[ EDIT ]';
  btn.classList.toggle('border-amber-500', editMode);
  btn.classList.toggle('text-amber-500', editMode);

  if (editMode) {
    setColumns(1, true); // force single column while editing
    if (sortableInst) { sortableInst.option('handle', '.bookmarkItem'); sortableInst.option('disabled', false); }
  } else {
    if (sortableInst) { sortableInst.option('handle', '.dragHandle'); sortableInst.option('disabled', true); }
    document.querySelectorAll('.editPanel').forEach(p => { p.classList.add('hidden'); p.classList.remove('flex'); });
  }
}

function setAddButtonActive(active) {
  const btn = document.getElementById('btnAddMode');
  btn.classList.toggle('border-blue-500', active);
  btn.classList.toggle('text-blue-500', active);
}

function toggleAddMode() {
  addMode = !addMode;
  console.log('[mode:add] addMode =', addMode);
  const form = document.getElementById('addForm');
  form.classList.toggle('hidden', !addMode);
  setAddButtonActive(addMode);
  document.getElementById('btnAddMode').textContent = addMode ? '[ EXIT ADD ]' : '[ ADD ]';
  if (addMode) form.querySelector('input[name="url"]').focus();
}

/* ══════════════════════════════════════════════
   Column layout
   ══════════════════════════════════════════════ */
let currentCols = 1;
const COL_CLASS_MAP = { 2: 'grid-cols-2', 3: 'grid-cols-3', 4: 'grid-cols-4' };

function setColumns(n, fromEdit) {
  const listEl = document.getElementById('bookmarkList');
  if (!listEl) return;
  if (!fromEdit) currentCols = n;

  listEl.classList.remove('grid', 'grid-cols-2', 'grid-cols-3', 'grid-cols-4', 'flex', 'flex-col', 'gap-2');
  if (n > 1) {
    listEl.classList.add('grid', COL_CLASS_MAP[n], 'gap-2');
  } else {
    listEl.classList.add('flex', 'flex-col', 'gap-2');
  }

  [1, 2, 3, 4].forEach(i => {
    const b = document.querySelector('.btnCol[data-cols="' + i + '"]');
    if (b) {
      b.classList.toggle('border-blue-500', i === n);
      b.classList.toggle('text-blue-500', i === n);
    }
  });

  if (!fromEdit) {
    localStorage.setItem('bmCols', n);
    console.log('[layout:cols] saved bmCols =', n);
  }
}

/* ══════════════════════════════════════════════
   Container width
   ══════════════════════════════════════════════ */
const WIDTH_OPTIONS = ['760px', '960px', '1024px', '98%'];

function setWidth(w) {
  const containerEl = document.getElementById('containerEl');
  if (containerEl) containerEl.style.maxWidth = w;
  WIDTH_OPTIONS.forEach(val => {
    const b = document.querySelector('.btnWidth[data-width="' + val + '"]');
    if (b) {
      b.classList.toggle('border-indigo-500', val === w);
      b.classList.toggle('text-indigo-500', val === w);
    }
  });
  localStorage.setItem('bmWidth', w);
  console.log('[layout:width] saved bmWidth =', w);
}

/* ══════════════════════════════════════════════
   Restore saved preferences on load
   ══════════════════════════════════════════════ */
(function restorePreferences() {
  const savedTheme = localStorage.getItem('bmTheme');
  if (savedTheme === 'dark') {
    document.getElementById('btnTheme').textContent = '[ LIGHT ]';
  }

  const savedCols = parseInt(localStorage.getItem('bmCols') || '1', 10);
  if (savedCols >= 1 && savedCols <= 4) setColumns(savedCols);

  const savedWidth = localStorage.getItem('bmWidth');
  setWidth(WIDTH_OPTIONS.includes(savedWidth) ? savedWidth : '760px');

  console.log('[init] restored preferences:', { savedTheme, savedCols, savedWidth });
})();

/* ══════════════════════════════════════════════
   Sortable (drag & drop reorder)
   ══════════════════════════════════════════════ */
const bookmarkListEl = document.getElementById('bookmarkList');
let sortableInst = null;
if (bookmarkListEl) {
  sortableInst = new Sortable(bookmarkListEl, {
    animation: 150,
    handle: '.dragHandle',
    ghostClass: 'opacity-30',
    dragClass: 'cursor-grabbing',
    disabled: true,
    onEnd: function () {
      const ids = [...bookmarkListEl.querySelectorAll('.bookmarkItem')].map(el => +el.dataset.id);
      console.log('[reorder] new order =', ids);
      fetch('/reorder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(ids)
      })
      .then(res => res.json())
      .then(data => console.log('[reorder] server response:', data))
      .catch(err => console.error('[reorder] failed:', err));
      toast('ORDER SAVED');
    }
  });
}

/* ══════════════════════════════════════════════
   Inline edit
   ══════════════════════════════════════════════ */
function openEdit(id, e) {
  e.stopPropagation();
  document.querySelectorAll('.editPanel').forEach(p => { p.classList.add('hidden'); p.classList.remove('flex'); });
  const panel = document.getElementById('edit-' + id);
  panel.classList.remove('hidden');
  panel.classList.add('flex');
  console.log('[edit:open] id =', id);
}

function closeEdit(id) {
  const panel = document.getElementById('edit-' + id);
  panel.classList.add('hidden');
  panel.classList.remove('flex');
  console.log('[edit:close] id =', id);
}

async function saveEdit(id) {
  const title = document.getElementById('et-' + id).value.trim();
  const url = document.getElementById('eu-' + id).value.trim();
  if (!url) { toast('URL REQUIRED', true); return; }

  console.log('[edit:save] id =', id, { title, url });
  try {
    const res = await fetch('/edit/' + id, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, url })
    });
    const data = await res.json();
    console.log('[edit:save] server response:', data);
    if (data.status === 'ok') {
      const li = document.getElementById('item-' + id);
      li.querySelector('.itemTitle').textContent = data.title;
      const anchor = li.querySelector('.itemUrl a');
      anchor.textContent = data.url;
      anchor.href = data.url;
      closeEdit(id);
      toast('ENTRY UPDATED');
    } else {
      toast(data.message || 'UPDATE FAILED', true);
    }
  } catch (err) {
    console.error('[edit:save] request failed:', err);
    toast('NETWORK ERROR', true);
  }
}

/* ══════════════════════════════════════════════
   Delete with confirm
   ══════════════════════════════════════════════ */
let pendingDeleteId = null;

function confirmDelete(id, e) {
  e.stopPropagation();
  pendingDeleteId = id;
  const overlay = document.getElementById('confirmOverlay');
  overlay.classList.remove('hidden');
  overlay.classList.add('flex');
  document.getElementById('confirmYes').onclick = () => executeDelete(id);
  console.log('[delete:confirm] pending id =', id);
}

function cancelDelete() {
  console.log('[delete:cancel] id =', pendingDeleteId);
  pendingDeleteId = null;
  const overlay = document.getElementById('confirmOverlay');
  overlay.classList.add('hidden');
  overlay.classList.remove('flex');
}

async function executeDelete(id) {
  const overlay = document.getElementById('confirmOverlay');
  overlay.classList.add('hidden');
  overlay.classList.remove('flex');

  console.log('[delete:execute] id =', id);
  try {
    const res = await fetch('/delete/' + id, { method: 'POST' });
    const data = await res.json();
    console.log('[delete:execute] server response:', data);
    if (data.status === 'ok') {
      document.getElementById('item-' + id).remove();
      const ep = document.getElementById('edit-' + id);
      if (ep) ep.remove();

      const count = document.querySelectorAll('.bookmarkItem').length;
      document.getElementById('listHeader').textContent = '> SAVED ENTRIES (' + count + ')';

      if (!count) {
        document.getElementById('bookmarkList').outerHTML =
          '<div class="text-center text-xs text-gray-400 dark:text-gray-500 tracking-widest border border-dashed border-gray-300 dark:border-gray-600 rounded-lg py-8">_ NO ENTRIES YET _</div>';
      }
      toast('ENTRY DELETED');
    }
  } catch (err) {
    console.error('[delete:execute] request failed:', err);
    toast('NETWORK ERROR', true);
  }
}

document.getElementById('confirmOverlay').addEventListener('click', function (e) {
  if (e.target === this) cancelDelete();
});

/* ══════════════════════════════════════════════
   Toast
   ══════════════════════════════════════════════ */
let toastTimer;
function toast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = '> ' + msg;
  el.classList.remove('opacity-0', 'translate-y-2', 'border-indigo-500', 'text-indigo-500', 'border-rose-500', 'text-rose-500');
  el.classList.add(isErr ? 'border-rose-500' : 'border-indigo-500', isErr ? 'text-rose-500' : 'text-indigo-500');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    el.classList.add('opacity-0', 'translate-y-2');
  }, 2200);
  console.log('[toast]', isErr ? 'ERROR' : 'OK', msg);
}
</script>
</body>
</html>
